<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MadX Clothing — Contact</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body>
  <header>
    <div class="container nav">
      <a class="logo" href="index.html">MadX</a>
      <a class="cart-link" href="cart.html" aria-label="Cart" title="Cart">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 6h15l-1.5 9h-12L5 3H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
          <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
        </svg>
      </a>
      <nav aria-label="Primary">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="product_detail.html">Products</a></li>
          <li><a href="product-listing.html">Items</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width: 720px;">
        <div class="centered" style="margin-bottom: 16px;">
          <h1>Get In Touch</h1>
          <p class="" style="color: #b3b3b3;">Questions, collabs, or feedback — send us a message.</p>
        </div>
        <form action="#" method="post">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Your name" required>
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="you@example.com" required>
          </div>
          <div>
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="How can we help?" required></textarea>
          </div>
          <div class="centered" style="margin-top: 4px;">
            <button class="btn" type="submit">Send Message</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner container">
      <div>© 2025 MadX Clothing. All rights reserved.</div>
    </div>
  </footer>
</body>
</html>
